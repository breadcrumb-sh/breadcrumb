name: Test

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build --workspace=packages/sdk-typescript --workspace=packages/ai-sdk

      - run: npm run typecheck

      - run: npm run test
