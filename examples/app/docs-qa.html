<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breadcrumb Docs Q&A</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 720px;
      margin: 0 auto;
    }
    header {
      padding: 14px 20px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .logo { font-weight: 700; font-size: 15px; letter-spacing: -0.02em; }
    .subtitle { font-size: 13px; color: #555; }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .suggestions {
      margin-top: 40px;
      text-align: center;
      color: #555;
      font-size: 14px;
    }
    .suggestions p { margin-bottom: 14px; }
    .suggestion-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }
    .suggestion-list li {
      cursor: pointer;
      padding: 8px 14px;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      font-size: 13px;
      color: #888;
      transition: all 0.15s;
      max-width: 400px;
    }
    .suggestion-list li:hover {
      color: #ccc;
      border-color: #333;
    }
    .qa-pair { display: flex; flex-direction: column; gap: 10px; }
    .question {
      align-self: flex-end;
      background: #1e1a33;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      max-width: 80%;
      color: #c4b5fd;
    }
    .answer {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      color: #ccc;
    }
    .answer code {
      background: #1a1a1a;
      border: 1px solid #252525;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 13px;
    }
    .thinking {
      color: #555;
      font-style: italic;
      padding: 10px 14px;
      font-size: 14px;
    }
    .thinking::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
    form {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      border-top: 1px solid #1a1a1a;
      flex-shrink: 0;
    }
    input {
      flex: 1;
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e8e8e8;
      font-size: 14px;
      outline: none;
    }
    input:focus { border-color: #333; }
    input:disabled { opacity: 0.5; }
    button {
      background: #7c6af7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <span class="logo">&#x25C6; breadcrumb</span>
    <span class="subtitle">docs Q&A</span>
  </header>

  <div class="content" id="content">
    <div class="suggestions" id="suggestions">
      <p>Ask a question about Breadcrumb</p>
      <ul class="suggestion-list">
        <li onclick="ask('How do I set up Breadcrumb with the TypeScript SDK?')">How do I set up Breadcrumb with the TypeScript SDK?</li>
        <li onclick="ask('What AI integrations does Breadcrumb support?')">What AI integrations does Breadcrumb support?</li>
        <li onclick="ask('How does trace ingestion work?')">How does trace ingestion work?</li>
        <li onclick="ask('Can I self-host Breadcrumb? What are the requirements?')">Can I self-host Breadcrumb? What are the requirements?</li>
        <li onclick="ask('How do I add custom spans to my traces?')">How do I add custom spans to my traces?</li>
      </ul>
    </div>
  </div>

  <form id="form" onsubmit="return handleSubmit(event)">
    <input id="input" type="text" placeholder="Ask about Breadcrumb..." autofocus />
    <button id="btn" type="submit">Ask</button>
  </form>

  <script>
    let loading = false;
    const sessionId = crypto.randomUUID();

    function ask(text) {
      if (loading) return;
      document.getElementById('input').value = '';
      submitQuestion(text);
    }

    function handleSubmit(e) {
      e.preventDefault();
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text || loading) return false;
      input.value = '';
      submitQuestion(text);
      return false;
    }

    async function submitQuestion(question) {
      loading = true;
      const btn = document.getElementById('btn');
      const input = document.getElementById('input');
      btn.disabled = true;
      input.disabled = true;

      // Remove suggestions
      const sug = document.getElementById('suggestions');
      if (sug) sug.remove();

      const content = document.getElementById('content');

      // Add question
      const pair = document.createElement('div');
      pair.className = 'qa-pair';
      pair.innerHTML = `<div class="question">${escapeHtml(question)}</div>`;
      content.appendChild(pair);

      // Add thinking indicator
      const thinking = document.createElement('div');
      thinking.className = 'thinking';
      thinking.textContent = 'Searching docs';
      pair.appendChild(thinking);

      content.scrollTop = content.scrollHeight;

      try {
        const res = await fetch('/api/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, sessionId }),
        });

        thinking.remove();

        const answer = document.createElement('div');
        answer.className = 'answer';
        answer.textContent = '';
        pair.appendChild(answer);

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          answer.textContent += decoder.decode(value, { stream: true });
          content.scrollTop = content.scrollHeight;
        }

        if (!answer.textContent.trim()) {
          answer.textContent = 'No response.';
        }
      } catch (err) {
        thinking.remove();
        const error = document.createElement('div');
        error.className = 'answer';
        error.style.color = '#f87171';
        error.textContent = 'Error: ' + err.message;
        pair.appendChild(error);
      }

      loading = false;
      btn.disabled = false;
      input.disabled = false;
      input.focus();
      content.scrollTop = content.scrollHeight;
    }

    function escapeHtml(text) {
      const d = document.createElement('div');
      d.textContent = text;
      return d.innerHTML;
    }
  </script>
</body>
</html>
